<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sLLMates</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Reset & Variables ───────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --o50:  #fff7ed;
      --o100: #ffedd5;
      --o200: #fed7aa;
      --o400: #fb923c;
      --o500: #f97316;
      --o600: #ea580c;
      --g50:  #f9fafb;
      --g100: #f3f4f6;
      --g200: #e5e7eb;
      --g300: #d1d5db;
      --g400: #9ca3af;
      --g500: #6b7280;
      --g700: #374151;
      --g900: #111827;
      --white: #ffffff;
      --sidebar-w: 260px;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 14px rgba(0,0,0,.08);
    }

    html, body {
      height: 100%;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--g50);
      color: var(--g900);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── Layout ──────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--g200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--g100);
      flex-shrink: 0;
    }
/* 부모 박스 고정 */
    .brand-icon {
        width: 32px !important;
        height: 32px !important;
        min-width: 32px; /* 찌그러짐 방지 */
        min-height: 32px;
        background: none !important; /* 주황색 배경 강제 제거 */
        box-shadow: none !important; /* 그림자 강제 제거 */
        overflow: hidden !important; /* 튀어나온 사진 숨기기 */
        display: flex !important;
        padding: 0 !important; /* 내부 여백 초기화 */
    }

    /* 이미지 크기 강제 제어 */
    .brand-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }
    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--g900);
    }
    .brand-name em {
      font-style: italic;
      color: var(--o500);
    }

    /* Tab nav */
    .tab-nav {
      display: flex;
      gap: 4px;
      padding: 10px 12px 0;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--g400);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .2px;
      transition: color .15s, background .15s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: var(--o500); }
    .tab-btn.active {
      color: var(--o600);
      border-bottom-color: var(--o500);
    }

    /* Panels */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* Sub tab nav */
    .sub-nav {
      display: flex;
      gap: 4px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--g100);
      flex-shrink: 0;
    }
    .sub-btn {
      padding: 5px 12px;
      border: 1px solid var(--g200);
      border-radius: 6px;
      background: transparent;
      color: var(--g500);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .sub-btn:hover { border-color: var(--o400); color: var(--o500); }
    .sub-btn.active {
      background: var(--o50);
      border-color: var(--o400);
      color: var(--o600);
      font-weight: 600;
    }

    /* Sub panels */
    .sub-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .sub-panel.active { display: flex; }

    /* Section label */
    .sec-label {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--g400);
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 12px 14px 5px;
      flex-shrink: 0;
    }

    /* Chat list */
    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
      font-size: 13px;
      color: var(--g700);
      white-space: nowrap;
      overflow: hidden;
    }
    .chat-item::before {
      content: '';
      width: 3px; height: 16px;
      border-radius: 2px;
      background: transparent;
      flex-shrink: 0;
      transition: background .15s;
    }
    .chat-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .chat-item:hover { background: var(--o50); }
    .chat-item.active {
      background: var(--o50);
      color: var(--o600);
      font-weight: 600;
    }
    .chat-item.active::before { background: var(--o500); }

    /* Sidebar bottom action area */
    .sidebar-actions {
      padding: 10px 12px;
      border-top: 1px solid var(--g100);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Buttons ──────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--o500), var(--o600));
      color: var(--white);
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(249,115,22,.25);
      font-weight: 600;
    }
    .btn-primary:hover {
      opacity: .93;
      box-shadow: 0 4px 14px rgba(249,115,22,.35);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(.98); }

    .btn-ghost {
      background: transparent;
      color: var(--g600);
      border-color: var(--g200);
    }
    .btn-ghost:hover { background: var(--g50); border-color: var(--g300); }

    .btn-danger {
      background: transparent;
      color: var(--g400);
      border-color: var(--g200);
    }
    .btn-danger:hover { background: #fef2f2; border-color: #fca5a5; color: #ef4444; }
    .btn-danger:active { background: #ef4444; color: var(--white); }

    .btn-sm { padding: 6px 11px; font-size: 12px; border-radius: 7px; }
    .btn-full { width: 100%; }

    /* ── Form controls ───────────────────────── */
    .form-group { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }

    input[type="text"], textarea, select {
      font-family: inherit;
      font-size: 13px;
      border: 1px solid var(--g200);
      border-radius: 8px;
      padding: 8px 11px;
      background: var(--white);
      color: var(--g900);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--o400);
      box-shadow: 0 0 0 3px rgba(249,115,22,.10);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

    /* Slider */
    .slider-wrap { padding: 2px 12px 8px; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--g500);
      margin-bottom: 4px;
    }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--g200);
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--o500);
      border: 2px solid var(--white);
      box-shadow: 0 1px 4px rgba(249,115,22,.35);
      cursor: pointer;
      transition: transform .15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* ── Bio list ────────────────────────────── */
    #bio-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .bio-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
      font-size: 12px;
      color: var(--g700);
    }
    .bio-item:hover { background: var(--o50); }
    .bio-item.active { background: var(--o50); color: var(--o600); font-weight: 600; }
    .bio-badge {
      flex-shrink: 0;
      background: var(--o100);
      color: var(--o600);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 1px;
    }
    .bio-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Status toast ────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--g900);
      color: var(--white);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Main chat area ──────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--g50);
    }

    /* Chat header */
    #chat-header {
      background: var(--white);
      border-bottom: 1px solid var(--g100);
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,.5);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--g900);
      letter-spacing: -.3px;
    }
    .header-sub {
      font-size: 11.5px;
      color: var(--g400);
      margin-top: 1px;
    }
    #current-chat-name {
      margin-left: auto;
      font-size: 12px;
      color: var(--g400);
      font-weight: 500;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--g400);
      padding-bottom: 60px;
    }
    .empty-icon {
      width: 56px; height: 56px;
      background: var(--o50);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--g600);
    }
    .empty-sub { font-size: 13px; }

    /* Message bubbles */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp .2s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }
    .avatar.ai {
      background: linear-gradient(135deg, var(--o100), var(--o200));
      font-size: 15px;
    }
    .avatar.user {
      background: var(--g100);
      font-size: 14px;
    }

    .bubble {
      max-width: 68%;
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.60;
      word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--o500), var(--o600));
      color: var(--white);
      border-radius: 16px 16px 4px 16px;
      box-shadow: 0 2px 8px rgba(249,115,22,.22);
    }
    .bubble.ai {
      background: var(--white);
      color: var(--g900);
      border: 1px solid var(--g100);
      border-radius: 16px 16px 16px 4px;
      box-shadow: var(--shadow);
    }
    /* markdown 내부 */
    .bubble.ai p { margin-bottom: .5em; }
    .bubble.ai p:last-child { margin-bottom: 0; }
    .bubble.ai code {
      background: var(--g100);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: 'Menlo', monospace;
    }
    .bubble.ai pre {
      background: var(--g900);
      color: #e5e7eb;
      padding: 12px 14px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12.5px;
      margin: 6px 0;
    }
    .bubble.ai pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
    .bubble.ai ul, .bubble.ai ol { padding-left: 18px; }

    /* Status bubble */
    .bubble.status {
      background: var(--o50);
      color: var(--o600);
      border: 1px dashed var(--o200);
      border-radius: 10px;
      font-size: 13px;
      padding: 8px 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .typing-dots {
      display: flex; gap: 3px; align-items: center;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--o400);
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Input area */
    #input-area {
      background: var(--white);
      border-top: 1px solid var(--g100);
      padding: 12px 16px 14px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      border: 1.5px solid var(--g200);
      border-radius: 12px;
      padding: 11px 15px;
      font-size: 14px;
      resize: none;
      min-height: 46px;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.55;
      transition: border-color .15s, box-shadow .15s;
    }
    #msg-input:focus {
      border-color: var(--o400);
      box-shadow: 0 0 0 3px rgba(249,115,22,.10);
      outline: none;
    }
    #send-btn {
      height: 46px;
      padding: 0 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--o500), var(--o600));
      color: var(--white);
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(249,115,22,.30);
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity:.92; box-shadow: 0 4px 16px rgba(249,115,22,.40); transform:translateY(-1px); }
    #send-btn:active { transform:scale(.97); }
    #send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* ── Divider ─────────────────────────────── */
    .divider { height:1px; background:var(--g100); margin:6px 0; flex-shrink:0; }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--g200); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--g300); }

    /* ── Modal (rename) ──────────────────────── */
    .modal-overlay {
      position: fixed; inset:0;
      background: rgba(0,0,0,.3);
      backdrop-filter: blur(2px);
      display:flex; align-items:center; justify-content:center;
      z-index:500;
      opacity:0; pointer-events:none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 22px 18px;
      width: 340px;
      box-shadow: 0 20px 40px rgba(0,0,0,.12);
      transform: scale(.94) translateY(8px);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-title { font-size:15px; font-weight:700; margin-bottom:14px; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ════════════ SIDEBAR ════════════ -->
  <aside id="sidebar">
    <div class="brand">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Brand Icon" class="brand-icon" />
      <div class="brand-name">sLL<em>Mates</em></div>
    </div>

    <!-- Top-level tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="chat">채팅</button>
      <button class="tab-btn" data-tab="bio">Bio</button>
    </div>

    <!-- ── 채팅 Panel ── -->
    <div class="panel active" id="panel-chat">
      <!-- Sub tabs -->
      <div class="sub-nav">
        <button class="sub-btn active" data-sub="chat-list">목록</button>
        <button class="sub-btn" data-sub="chat-rename">이름 변경</button>
      </div>

      <!-- 목록 sub-panel -->
      <div class="sub-panel active" id="sub-chat-list">
        <div class="sidebar-actions" style="border-top:none; border-bottom:1px solid var(--g100); padding-bottom:10px;">
          <button class="btn btn-primary btn-full btn-sm" id="new-chat-btn">＋ 새 채팅 시작</button>
        </div>
        <div class="sec-label">대화 기록</div>
        <div id="chat-list"></div>
        <div class="divider"></div>
        <div class="sidebar-actions">
          <button class="btn btn-danger btn-full btn-sm" id="delete-chat-btn">🗑 채팅방 삭제</button>
        </div>
      </div>

      <!-- 이름변경 sub-panel -->
      <div class="sub-panel" id="sub-chat-rename">
        <div class="sec-label">현재 채팅방</div>
        <div class="form-group">
          <input type="text" id="current-chat-display" readonly placeholder="선택된 채팅방 없음" style="background:var(--g50);color:var(--g500);" />
        </div>
        <div class="sec-label" style="margin-top:4px;">새 이름</div>
        <div class="form-group">
          <input type="text" id="rename-input" placeholder="새 이름을 입력하세요" />
        </div>
        <div class="form-group">
          <button class="btn btn-primary btn-full btn-sm" id="rename-btn">✏ 이름 변경</button>
        </div>
      </div>
    </div>

    <!-- ── Bio Panel ── -->
    <div class="panel" id="panel-bio">
      <div class="sub-nav">
        <button class="sub-btn active" data-sub="bio-list">목록</button>
        <button class="sub-btn" data-sub="bio-add">추가</button>
        <button class="sub-btn" data-sub="bio-edit">수정</button>
      </div>

      <!-- 목록 -->
      <div class="sub-panel active" id="sub-bio-list">
        <div class="sec-label">저장된 Bio</div>
        <div id="bio-list"></div>
        <div class="divider"></div>
        <div class="sidebar-actions">
          <button class="btn btn-ghost btn-full btn-sm" id="refresh-bio-btn">↺ 새로고침</button>
        </div>
      </div>

      <!-- 추가 -->
      <div class="sub-panel" id="sub-bio-add">
        <div class="sec-label">Bio 내용</div>
        <div class="form-group">
          <textarea id="add-bio-text" placeholder="예: 사용자는 Python을 좋아합니다" rows="4"></textarea>
        </div>
        <div class="sec-label">중요도</div>
        <div class="slider-wrap">
          <div class="slider-label"><span>낮음</span><span id="add-importance-val">2</span><span>높음</span></div>
          <input type="range" id="add-bio-importance" min="1" max="3" value="2" />
        </div>
        <div class="form-group">
          <button class="btn btn-primary btn-full btn-sm" id="add-bio-btn">＋ Bio 추가</button>
        </div>
      </div>

      <!-- 수정 -->
      <div class="sub-panel" id="sub-bio-edit">
        <div class="sec-label">수정할 Bio 선택</div>
        <div class="form-group">
          <select id="bio-select"><option value="">-- 선택하세요 --</option></select>
        </div>
        <div class="sec-label">내용</div>
        <div class="form-group">
          <textarea id="edit-bio-text" placeholder="수정할 내용" rows="4"></textarea>
        </div>
        <div class="sec-label">중요도</div>
        <div class="slider-wrap">
          <div class="slider-label"><span>낮음</span><span id="edit-importance-val">2</span><span>높음</span></div>
          <input type="range" id="edit-bio-importance" min="1" max="3" value="2" />
        </div>
        <div class="form-group" style="flex-direction:row; gap:6px;">
          <button class="btn btn-primary btn-sm" style="flex:2" id="update-bio-btn">💾 저장</button>
          <button class="btn btn-danger btn-sm" style="flex:1" id="delete-bio-btn">🗑</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ════════════ MAIN ════════════ -->
  <main id="main">
    <div id="chat-header">
      <div class="status-dot"></div>
      <div>
        <div class="header-title">sLLMates AI 어시스턴트</div>
        <div class="header-sub">llama.cpp · LangGraph 기반</div>
      </div>
      <div id="current-chat-name">채팅방을 선택하세요</div>
    </div>

    <div id="messages">
      <div id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">새 채팅을 시작해보세요</div>
        <div class="empty-sub">왼쪽에서 채팅을 선택하거나 새 채팅을 만드세요</div>
      </div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
        <button id="send-btn">전송 →</button>
      </div>
    </div>
  </main>
</div>

<!-- Rename modal -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <div class="modal-title">채팅방 이름 변경</div>
    <input type="text" id="modal-rename-input" placeholder="새 이름을 입력하세요" style="width:100%" />
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="modal-cancel-btn">취소</button>
      <button class="btn btn-primary btn-sm" id="modal-confirm-btn">변경</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
